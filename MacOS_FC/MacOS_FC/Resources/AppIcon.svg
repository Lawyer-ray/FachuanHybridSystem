<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="50%" style="stop-color:#312E81"/>
      <stop offset="100%" style="stop-color:#4338CA"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#312E81;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#A5B4FC"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <!-- 中心光晕 -->
  <circle cx="512" cy="512" r="300" fill="url(#glow)"/>

  <!-- 外环 -->
  <circle cx="512" cy="512" r="260" stroke="url(#ring)" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- 中环 -->
  <circle cx="512" cy="512" r="200" stroke="url(#ring)" stroke-width="4" fill="none" opacity="0.6"/>

  <!-- 内环 -->
  <circle cx="512" cy="512" r="140" stroke="url(#ring)" stroke-width="5" fill="none" opacity="0.8"/>

  <!-- 核心六边形 -->
  <polygon points="512,372 633,442 633,582 512,652 391,582 391,442" stroke="url(#ring)" stroke-width="6" fill="none"/>

  <!-- 中心点 -->
  <circle cx="512" cy="512" r="24" fill="url(#ring)"/>

  <!-- 六条射线连接核心与外环 -->
  <line x1="512" y1="372" x2="512" y2="252" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>
  <line x1="633" y1="442" x2="737" y2="332" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>
  <line x1="633" y1="582" x2="737" y2="692" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>
  <line x1="512" y1="652" x2="512" y2="772" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>
  <line x1="391" y1="582" x2="287" y2="692" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>
  <line x1="391" y1="442" x2="287" y2="332" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>

  <!-- 外围节点 -->
  <circle cx="512" cy="252" r="10" fill="#E0E7FF"/>
  <circle cx="737" cy="332" r="10" fill="#E0E7FF"/>
  <circle cx="737" cy="692" r="10" fill="#E0E7FF"/>
  <circle cx="512" cy="772" r="10" fill="#E0E7FF"/>
  <circle cx="287" cy="692" r="10" fill="#E0E7FF"/>
  <circle cx="287" cy="332" r="10" fill="#E0E7FF"/>
</svg>
