<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0c0515"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <radialGradient id="glow5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF"/>
      <stop offset="50%" style="stop-color:#A5B4FC"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow5f" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg5)"/>
  <circle cx="512" cy="512" r="300" fill="url(#glow5)"/>
  <!-- 水晶棱形 -->
  <polygon points="512,180 680,400 680,624 512,844 344,624 344,400" fill="none" stroke="url(#crystal)" stroke-width="3" filter="url(#glow5f)"/>
  <polygon points="512,260 620,420 620,604 512,764 404,604 404,420" fill="#1E1B4B" fill-opacity="0.5" stroke="#818CF8" stroke-width="2"/>
  <polygon points="512,340 560,440 560,584 512,684 464,584 464,440" fill="#312E81" fill-opacity="0.6" stroke="#A5B4FC" stroke-width="1.5"/>
  <!-- 中心光点 -->
  <circle cx="512" cy="512" r="40" fill="#6366F1" filter="url(#glow5f)"/>
  <circle cx="512" cy="512" r="20" fill="#C4B5FD"/>
  <circle cx="512" cy="512" r="8" fill="#fff"/>
  <!-- 顶点光点 -->
  <circle cx="512" cy="180" r="10" fill="#E0E7FF" filter="url(#glow5f)"/>
  <circle cx="512" cy="844" r="10" fill="#E0E7FF" filter="url(#glow5f)"/>
</svg>
