target-version = "py312"
line-length = 120
extend-exclude = [
    "migrations",
    ".venv",
]

[lint]
select = ["E", "F", "W", "B", "C4", "SIM", "TID", "C90", "UP", "RUF", "S"]
ignore = [
    "B005",
    "B007",
    "B008",
    "B019",
    "B023",
    "B027",
    "E721",
    "E741",
    "F401",
    "F402",
    "F811",
    "S101",
    "S105",
    "S106",
    "SIM102",
    "SIM105",
    "SIM113",
    "UP035",
    "C401",
    "C414",
    "E203",
    "E402",
    "RUF005",
    "RUF001",
    "RUF002",
    "RUF003",
    "RUF012",
    "RUF022",
    "RUF059",
    "S104",
    "S107",
    "S108",
    "S110",  # 保留：爬虫和配置加载的容错
    "S112",  # 保留：爬虫和配置加载的容错
    "S307",
    "S308",
    "S311",
    "S324",
    "S603",  # 保留：SubprocessRunner 已通过白名单校验 args 并强制 shell=False，属安全封装
    "S608",
    "SIM103",
    "SIM108",
    "SIM110",
    "SIM115",
    "SIM118",
    "SIM401",
    "UP028",
    "UP042",
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101"]
"conftest.py" = ["S101"]
"docs/**/*.py" = ["S101"]
"scripts/**/*.py" = ["S101"]
"__init__.py" = ["F401", "F403"]
"admin.py" = ["F401"]
"**/admin/*.py" = ["F401"]
"apps/automation/services/token/history_recorder.py" = ["C901"]
"apps/automation/services/token/token_acquisition_orchestrator.py" = ["C901"]
"apps/cases/admin/case_inlines_admin.py" = ["C901"]
"apps/cases/admin/case_widgets_admin.py" = ["F821"]
"apps/automation/services/ai/prompts.py" = ["E501"]
"apps/core/utils/typing_helpers.py" = ["UP047"]  # TypeVar 方式与 mypy --strict 更兼容，暂不迁移到 PEP 695 type parameters 语法

[lint.mccabe]
max-complexity = 10

[lint.flake8-tidy-imports.banned-api]
requests = { msg = "禁止使用 requests，请改用 httpx" }
