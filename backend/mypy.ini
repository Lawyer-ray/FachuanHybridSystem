[mypy]
# Python version
python_version = 3.12

# Import discovery
mypy_path = .
namespace_packages = True

# Cache configuration
cache_dir = .mypy_cache
incremental = True

# Warnings
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# Error handling
ignore_missing_imports = True
no_strict_optional = False
allow_redefinition = True

# Output
show_error_codes = True
show_column_numbers = True
pretty = True

# Strictness (globally enabled)
check_untyped_defs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True

# ============================================================
# Per-module options: structural ignores
# ============================================================

# --- Migrations (auto-generated, skip entirely) ---
[mypy-*.migrations.*]
ignore_errors = True

# --- Admin (Django admin dynamic attributes) ---
[mypy-*.admin.*]
ignore_errors = True

# --- Tests (allow flexibility) ---
[mypy-*.tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# --- Config migrator (complex migration logic) ---
[mypy-apps.core.config.migrator]
warn_return_any = False
disallow_any_expr = False

[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-conftest]
ignore_errors = True

# ============================================================
# Per-module options: existing code gradual adoption
# These modules have legacy code that predates strict mode.
# New code in these modules should still follow strict typing.
# ============================================================

# --- Models (Django ORM dynamic attributes, descriptors) ---
[mypy-apps.*.models]
ignore_errors = True

[mypy-apps.*.models.*]
ignore_errors = True

# --- API layer (DRF views, serializers, dynamic patterns) ---
# [mypy-apps.*.api.*]
# ignore_errors = True  # Removed in batch 3

# --- Services (large codebase, gradual migration) ---
[mypy-apps.*.services.*]
ignore_errors = False

# --- Temporarily ignore other apps' services while fixing contracts ---
# [mypy-apps.automation.services.*]
# ignore_errors = True  # Removed in batch 2

# [mypy-apps.documents.services.*]
# ignore_errors = True  # Removed in batch 2

# [mypy-apps.cases.services.*]
# ignore_errors = True  # Removed in batch 2

# --- Schemas (Pydantic/DRF serializer patterns) ---
# [mypy-apps.*.schemas]
# ignore_errors = True  # Removed in batch 3

# [mypy-apps.*.schemas.*]
# ignore_errors = True  # Removed in batch 3

# --- Management commands ---

# --- Scripts (utility scripts, not part of main codebase) ---
[mypy-scripts.*]
ignore_errors = True

# ============================================================
# Per-module options: third-party libraries without type stubs
# ============================================================

[mypy-rapidocr_onnxruntime.*]
ignore_missing_imports = True

[mypy-selenium.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True
