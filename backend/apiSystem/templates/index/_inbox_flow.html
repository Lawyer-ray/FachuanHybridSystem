<!-- 收件箱智能处理中枢演示 -->
<section class="inbox-flow-section" id="inbox-flow">
    <div class="inbox-flow-container">
        <div class="section-header reveal">
            <span class="section-tag">📥 {</span>
            <h2 class="section-title">{</h2>
            <p class="section-desc">{</p>
        </div>

        <div class="inbox-demo" id="inboxFlowDemo">
            <div class="inbox-demo-hud">
                <div class="inbox-demo-mode-group">
                    <div class="inbox-sync-chip" id="inboxAutoPollChip">⏱ {</div>
                    <div class="inbox-sync-chip" id="inboxManualSyncChip">⚡ {</div>
                    <div class="inbox-sync-chip" id="inboxParallelChip">⇄ {</div>
                </div>
                <div class="inbox-sync-status" id="inboxSyncStatus">{</div>
            </div>

            <div class="inbox-topology-board">
                <div class="inbox-flow-lane lane-court-in" id="laneCourtIn"></div>
                <div class="inbox-flow-lane lane-material-in" id="laneMaterialIn"></div>
                <div class="inbox-flow-lane lane-court-out" id="laneCourtOut"></div>
                <div class="inbox-flow-lane lane-material-out" id="laneMaterialOut"></div>

                <div class="inbox-packet-stream packet-court-in" id="packetCourt"></div>
                <div class="inbox-packet-stream packet-material-in" id="packetScanner"></div>
                <div class="inbox-packet-stream packet-court-out" id="packetCourtOut"></div>
                <div class="inbox-packet-stream packet-material-out" id="packetMaterialOut"></div>

                <div class="inbox-network-canvas">
                    <div class="inbox-column inbox-column-left">
                        <div class="inbox-source-card" id="inboxCourtMsg">
                            <div class="inbox-source-icon court">🏛️</div>
                            <div class="inbox-source-main">
                                <div class="inbox-source-title">{</div>
                                <div class="inbox-source-desc">{</div>
                                <div class="inbox-source-meta">{</div>
                            </div>
                        </div>

                        <div class="inbox-source-card" id="inboxScannerFile">
                            <div class="inbox-source-icon scanner">🖨️</div>
                            <div class="inbox-source-main">
                                <div class="inbox-source-title">{</div>
                                <div class="inbox-source-desc">{</div>
                                <div class="inbox-source-meta">{</div>
                            </div>
                        </div>
                    </div>

                    <div class="inbox-column inbox-column-center">
                        <div class="inbox-router-shell">
                            <div class="inbox-router-core" id="inboxRouterCore">🧠</div>
                            <div class="inbox-router-title">{</div>
                            <div class="inbox-router-sub">{</div>
                            <div class="inbox-router-state" id="inboxFlowState">{</div>

                            <div class="inbox-route-matrix">
                                <div class="inbox-route-node" id="routeParse">
                                    <span class="inbox-route-code">01</span>
                                    <span class="inbox-route-title">{</span>
                                </div>
                                <div class="inbox-route-node" id="routeClassify">
                                    <span class="inbox-route-code">02</span>
                                    <span class="inbox-route-title">{</span>
                                </div>
                                <div class="inbox-route-node" id="routeMatch">
                                    <span class="inbox-route-code">03</span>
                                    <span class="inbox-route-title">{</span>
                                </div>
                                <div class="inbox-route-node" id="routePolicy">
                                    <span class="inbox-route-code">04</span>
                                    <span class="inbox-route-title">{</span>
                                </div>
                            </div>

                            <div class="inbox-router-metrics">
                                <div class="inbox-metric-card" id="inboxMetricCourt">
                                    <span class="label">{</span>
                                    <span class="value" id="inboxMetricCourtValue">0%</span>
                                </div>
                                <div class="inbox-metric-card" id="inboxMetricMaterial">
                                    <span class="label">{</span>
                                    <span class="value" id="inboxMetricMaterialValue">0</span>
                                </div>
                                <div class="inbox-metric-card" id="inboxMetricRisk">
                                    <span class="label">{</span>
                                    <span class="value" id="inboxMetricRiskValue">0</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="inbox-column inbox-column-right">
                        <div class="inbox-branch branch-court" id="inboxBranchCourt">
                            <div class="inbox-branch-head">
                                <span class="inbox-branch-title">🏛️ {</span>
                                <span class="inbox-branch-badge" id="inboxBranchCourtBadge">{</span>
                            </div>
                            <div class="inbox-branch-item" id="inboxCourtStep1">{</div>
                            <div class="inbox-branch-item" id="inboxCourtStep2">{</div>
                            <div class="inbox-branch-item" id="inboxCourtStep3">{</div>
                        </div>

                        <div class="inbox-branch branch-material" id="inboxBranchMaterial">
                            <div class="inbox-branch-head">
                                <span class="inbox-branch-title">📦 {</span>
                                <span class="inbox-branch-badge" id="inboxBranchMaterialBadge">{</span>
                            </div>
                            <div class="inbox-branch-split-grid">
                                <div class="inbox-branch-pane branch-incoming" id="inboxBranchIncoming">
                                    <div class="inbox-branch-pane-title">📩 {</div>
                                    <div class="inbox-branch-item" id="inboxIncomingStep1">{</div>
                                    <div class="inbox-branch-item" id="inboxIncomingStep2">{</div>
                                    <div class="inbox-branch-item" id="inboxIncomingStep3">{</div>
                                </div>

                                <div class="inbox-branch-pane branch-outgoing" id="inboxBranchOutgoing">
                                    <div class="inbox-branch-pane-title">📤 {</div>
                                    <div class="inbox-branch-item" id="inboxOutgoingStep1">{</div>
                                    <div class="inbox-branch-item" id="inboxOutgoingStep2">{</div>
                                    <div class="inbox-branch-item" id="inboxOutgoingStep3">{</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="inbox-log-board" id="inboxLogBoard">
            <div class="inbox-log-label">{</div>
            <div class="inbox-log-item" id="inboxLog1">{</div>
            <div class="inbox-log-item" id="inboxLog2">{</div>
            <div class="inbox-log-item" id="inboxLog3">{</div>
            <div class="inbox-log-item" id="inboxLog4">{</div>
        </div>

        <div class="inbox-result-strip" id="inboxResultStrip">
            <div class="inbox-result-card" id="inboxResultCard1">
                <div class="title">{</div>
                <div class="value" id="inboxStatLinked">0</div>
            </div>
            <div class="inbox-result-card" id="inboxResultCard2">
                <div class="title">{</div>
                <div class="value" id="inboxStatSplit">0</div>
            </div>
            <div class="inbox-result-card" id="inboxResultCard3">
                <div class="title">{</div>
                <div class="value" id="inboxStatTodo">0</div>
            </div>
            <div class="inbox-result-card" id="inboxResultCard4">
                <div class="title">{</div>
                <div class="value" id="inboxStatFiled">0</div>
            </div>
        </div>

        <div class="inbox-flow-steps" id="inboxFlowSteps">
            <div class="inbox-flow-step" data-step="1"><span class="inbox-flow-step-num">1</span><span>{</span></div>
            <div class="inbox-flow-step" data-step="2"><span class="inbox-flow-step-num">2</span><span>{</span></div>
            <div class="inbox-flow-step" data-step="3"><span class="inbox-flow-step-num">3</span><span>{</span></div>
            <div class="inbox-flow-step" data-step="4"><span class="inbox-flow-step-num">4</span><span>{</span></div>
            <div class="inbox-flow-step" data-step="5"><span class="inbox-flow-step-num">5</span><span>{</span></div>
            <div class="inbox-flow-step" data-step="6"><span class="inbox-flow-step-num">6</span><span>{</span></div>
        </div>

        <div class="flow-controls">
            <button class="flow-btn flow-btn-play" id="inboxFlowPlayBtn" onclick="startInboxFlowAnimation()">
                <span>▶</span> {
            </button>
            <button class="flow-btn flow-btn-reset" id="inboxFlowResetBtn" onclick="resetInboxFlowAnimation()">
                <span>↺</span> {
            </button>
        </div>
    </div>
</section>
