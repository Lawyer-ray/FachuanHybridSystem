
<div class="lpr-calc__input">
    <!-- 模式切换 -->
    <div class="lpr-calc__mode">
        <button type="button" class="lpr-calc__mode-btn" :class="{active: !useChanges}" @click="useChanges = false">
            {
        </button>
        <button type="button" class="lpr-calc__mode-btn" :class="{active: useChanges}" @click="useChanges = true">
            {
        </button>
    </div>

    <!-- 固定本金 -->
    <div x-show="!useChanges" class="lpr-calc__section">
        <div class="lpr-calc__section-title">{</div>
        <div class="lpr-calc__row lpr-calc__row--2">
            <div class="lpr-calc__field">
                <label>{</label>
                <input type="date" x-model="form.start_date">
            </div>
            <div class="lpr-calc__field">
                <label>{</label>
                <input type="date" x-model="form.end_date">
            </div>
        </div>
        <div class="lpr-calc__row" style="margin-top: 10px;">
            <div class="lpr-calc__field">
                <label>{</label>
                <input type="number" x-model="form.principal" step="0.01" placeholder="{">
            </div>
            <div class="lpr-calc__field">
                <label>{</label>
                <select x-model="form.date_inclusion">
                    <option value="both">{</option>
                    <option value="start_only">{</option>
                    <option value="end_only">{</option>
                    <option value="neither">{</option>
                </select>
            </div>
            <div class="lpr-calc__field"></div>
        </div>
    </div>

    <!-- 变动本金 -->
    <div x-show="useChanges" class="lpr-calc__section">
        <div class="lpr-calc__section-title">{</div>
        <div class="lpr-calc__changes">
            <template x-for="(item, i) in form.changes" :key="i">
                <div class="lpr-calc__change-row">
                    <div class="lpr-calc__field">
                        <label x-show="i === 0">{</label>
                        <input type="date" x-model="item.start_date" @change="onChangeStartDate(i)">
                    </div>
                    <div class="lpr-calc__field">
                        <label x-show="i === 0">{</label>
                        <input type="date" x-model="item.end_date" @change="onChangeEndDate(i)">
                    </div>
                    <div class="lpr-calc__field">
                        <label x-show="i === 0">{</label>
                        <input type="number" x-model="item.principal" step="0.01" placeholder="{">
                    </div>
                    <button type="button" class="lpr-calc__btn-remove" @click="removeChange(i)" x-show="form.changes.length > 1">×</button>
                </div>
            </template>
            <button type="button" class="lpr-calc__btn-add" @click="addChange">
                + {
            </button>
        </div>
        <div class="lpr-calc__field" style="margin-top: 10px;">
            <label>{</label>
            <select x-model="form.date_inclusion">
                <option value="both">{</option>
                <option value="start_only">{</option>
                <option value="end_only">{</option>
                <option value="neither">{</option>
            </select>
        </div>
    </div>

    <!-- 利率设置 -->
    <div class="lpr-calc__section">
        <div class="lpr-calc__section-title">{</div>

        <!-- 利率模式切换 -->
        <div class="lpr-calc__mode" style="margin-bottom: 16px;">
            <button type="button" class="lpr-calc__mode-btn" :class="{active: form.rate_mode === 'lpr'}" @click="form.rate_mode = 'lpr'">
                {
            </button>
            <button type="button" class="lpr-calc__mode-btn" :class="{active: form.rate_mode === 'custom'}" @click="form.rate_mode = 'custom'">
                {
            </button>
            <button type="button" class="lpr-calc__mode-btn" :class="{active: form.rate_mode === 'delay'}" @click="form.rate_mode = 'delay'">
                {
            </button>
        </div>

        <!-- LPR 模式 -->
        <div x-show="form.rate_mode === 'lpr'" class="lpr-calc__row">
            <div class="lpr-calc__field">
                <label>{</label>
                <select x-model="form.rate_type">
                    <option value="1y">{</option>
                    <option value="5y">{</option>
                </select>
            </div>
            <div class="lpr-calc__field">
                <label>{</label>
                <input type="number" x-model="form.multiplier" step="0.1" placeholder="{">
            </div>
            <div class="lpr-calc__field">
                <label>{</label>
                <select x-model="form.year_days">
                    <option value="360">{</option>
                    <option value="365">{</option>
                    <option value="0">{</option>
                </select>
            </div>
        </div>

        <!-- 自定义利率模式 -->
        <div x-show="form.rate_mode === 'custom'" class="lpr-calc__row">
            <div class="lpr-calc__field">
                <label>{</label>
                <select x-model="form.custom_rate_unit">
                    <option value="percent">{</option>
                    <option value="permille">{</option>
                    <option value="permyriad">{</option>
                </select>
            </div>
            <div class="lpr-calc__field">
                <label>{</label>
                <input type="number" x-model="form.custom_rate_value" step="0.01" placeholder="{">
            </div>
            <div class="lpr-calc__field">
                <label>{</label>
                <select x-model="form.year_days">
                    <option value="360">{</option>
                    <option value="365">{</option>
                    <option value="0">{</option>
                </select>
            </div>
        </div>

        <!-- 迟延履行利率模式 -->
        <div x-show="form.rate_mode === 'delay'" class="lpr-calc__row">
            <div class="lpr-calc__field">
                <label>{</label>
                <input type="text" value="{" disabled style="background: #f3f4f6; color: #6b7280;">
            </div>
            <div class="lpr-calc__field">
                <label>{</label>
                <input type="number" value="1.75" disabled style="background: #f3f4f6; color: #6b7280;">
            </div>
            <div class="lpr-calc__field">
                <label>{</label>
                <select x-model="form.year_days">
                    <option value="360">{</option>
                    <option value="365">{</option>
                    <option value="0">{</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 同步中指示器 -->
    <div x-show="syncing" style="display: none; padding: 10px 16px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; font-size: 13px; color: #1d4ed8; margin-top: 8px;">
        <span style="display: inline-block; width: 14px; height: 14px; border: 2px solid #93c5fd; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;"></span>
        {
    </div>

    <!-- 同步结果消息 -->
    <div x-show="syncMessage" x-text="syncMessage" style="display: none; padding: 8px 16px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; font-size: 12px; color: #166534; margin-top: 8px;"></div>

    <!-- 操作按钮 -->
    <div class="lpr-calc__actions">
        <button type="button" class="lpr-calc__btn lpr-calc__btn--primary" @click="calculate">
            {
        </button>
        <button type="button" class="lpr-calc__btn lpr-calc__btn--secondary" @click="reset">
            {
        </button>
        <button type="button" class="lpr-calc__btn lpr-calc__btn--secondary" @click="showHistory = !showHistory" style="margin-left: auto;">
            { <span x-show="history.length > 0" x-text="'(' + history.length + ')'" style="font-size: 11px; opacity: 0.7;"></span>
        </button>
    </div>

    <!-- 历史记录列表 -->
    <div x-show="showHistory" style="display: none; margin-top: 16px; background: #f9fafb; border-radius: 8px; padding: 16px; border: 1px solid #e5e7eb;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div style="font-size: 13px; font-weight: 600; color: #374151;">{</div>
            <button type="button" @click="clearHistory" x-show="history.length > 0" style="font-size: 11px; color: #dc2626; background: none; border: none; cursor: pointer;">
                {
            </button>
        </div>

        <div x-show="history.length === 0" style="text-align: center; padding: 20px; color: #9ca3af; font-size: 13px;">
            {
        </div>

        <div x-show="history.length > 0" style="max-height: 300px; overflow-y: auto;">
            <template x-for="item in history" :key="item.id">
                <div style="display: flex; align-items: center; gap: 12px; padding: 10px; background: #fff; border-radius: 6px; margin-bottom: 8px; border: 1px solid #e5e7eb;">
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-size: 12px; font-weight: 500; color: #111; margin-bottom: 2px;">
                            <span x-text="item.useChanges ? '{' : '{'"></span>
                            <span x-text="'· ¥' + formatMoney(item.result.total_interest)" style="color: #417690;"></span>
                        </div>
                        <div style="font-size: 11px; color: #6b7280; margin-bottom: 2px;">
                            <span x-text="formatHistoryTime(item.timestamp)"></span>
                            <span x-text="'· ' + item.result.total_days + '{'"></span>
                        </div>
                        <div style="font-size: 10px; color: #9ca3af;">
                            <span x-text="item.rateInfo" style="background: #f3f4f6; padding: 1px 6px; border-radius: 4px;"></span>
                        </div>
                    </div>
                    <button type="button" @click="loadFromHistory(item)" style="font-size: 11px; color: #417690; background: #f0f7fa; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; white-space: nowrap;">
                        {
                    </button>
                    <button type="button" @click="deleteHistoryItem(item.id)" style="font-size: 11px; color: #dc2626; background: #fee2e2; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer;">
                        ×
                    </button>
                </div>
            </template>
        </div>
    </div>
</div>
