{% extends "admin/change_form.html" %}
{% load i18n static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'contracts/css/invoice_recognition.css' %}">
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script src="{% static 'contracts/js/invoice_recognition.js' %}"></script>
{% endblock %}

{% block after_field_sets %}
{{ block.super }}
<div class="module invoice-recognition-module" x-data="invoiceRecognition()">
    <h2>{</h2>

    <!-- 上传消息 -->
    <template x-if="uploadMessage">
        <div class="ir-message" :class="messageType" x-text="uploadMessage"></div>
    </template>

    <!-- 文件上传区域 -->
    <div class="ir-upload-section">
        <div class="ir-upload-zone"
             :class="{ 'dragging': dragging }"
             @dragover.prevent="dragging = true"
             @dragleave.prevent="dragging = false"
             @drop.prevent="handleDrop($event)"
             @click="$refs.fileInput.click()">
            <div class="upload-icon">📄</div>
            <p class="upload-text">{</p>
            <p class="upload-hint">{</p>
            <input type="file"
                   x-ref="fileInput"
                   multiple
                   accept=".pdf,.jpg,.jpeg,.png"
                   style="display: none;"
                   @change="handleFileSelect($event)">
        </div>

        <button type="button"
                class="button ir-upload-btn"
                @click="$refs.fileInput.click()"
                :disabled="uploading">
            <span x-show="!uploading">📤 {</span>
            <span x-show="uploading">⏳ {</span>
        </button>
    </div>

    <!-- 上传进度条 -->
    <div x-show="uploading" class="ir-progress-section">
        <div class="ir-progress-label">
            {... <span x-text="progress + '%'"></span>
        </div>
        <div class="ir-progress-bar">
            <div class="ir-progress-fill" :style="'width: ' + progress + '%'"></div>
        </div>
    </div>

    <!-- 识别结果预览 -->
    <template x-if="results.length > 0">
        <div class="ir-results-section">
            <h3>{</h3>
            <table class="ir-results-table">
                <thead>
                    <tr>
                        <th>{</th>
                        <th>{</th>
                        <th>{</th>
                        <th>{</th>
                        <th>{</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="result in results" :key="result.filename">
                        <tr :class="{ 'error': !result.success }">
                            <td x-text="result.filename"></td>
                            <template x-if="result.success">
                                <td x-text="result.data.invoice_number || '-'"></td>
                                <td x-text="result.data.invoice_date || '-'"></td>
                                <td>¥<span x-text="parseFloat(result.data.total_amount || 0).toFixed(2)"></span></td>
                                <td class="success">✓ {</td>
                            </template>
                            <template x-if="!result.success">
                                <td colspan="3" x-text="result.error" class="error-message"></td>
                                <td class="error">✗ {</td>
                            </template>
                        </tr>
                    </template>
                </tbody>
            </table>

            <div class="ir-summary">
                <span class="summary-label">{:</span>
                <span class="summary-value" x-text="successCount"></span>
                <span class="summary-label">{:</span>
                <span class="summary-value" x-text="failureCount"></span>
                <span class="summary-label">{:</span>
                <span class="summary-amount">¥<span x-text="totalAmount.toFixed(2)"></span></span>
            </div>

            <div class="ir-hint">
                <p>{</p>
            </div>
        </div>
    </template>
</div>
{% endblock %}
