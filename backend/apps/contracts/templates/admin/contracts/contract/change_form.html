{% extends "admin/change_form.html" %}
{% load i18n admin_urls static %}

{% block extrahead %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'contracts/css/folder_browser.css' %}">
<script src="{% static 'contracts/js/folder_browser.js' %}"></script>
<style>
.inline-group .tabular td { font-size: 0.8125rem; }
</style>
{% endblock %}

{% block submit_buttons_bottom %}
{{ block.super }}

{% if original %}
<!-- 文件夹绑定组件 -->
<div x-data="folderBrowser({{ original.pk }})" class="folder-binding-widget">
    <h3>📁 文件夹绑定</h3>
    
    <!-- 绑定状态 -->
    <div class="binding-status">
        <span class="status-badge" :class="binding ? 'bound' : 'unbound'" x-text="binding ? '已绑定' : '未绑定'"></span>
    </div>
    
    <!-- 绑定路径 -->
    <div x-show="binding" class="binding-path" x-text="binding?.display_path || binding?.folder_path"></div>
    
    <!-- 操作按钮 -->
    <div class="binding-actions">
        <button type="button" class="btn-folder primary" @click="openBrowser()" :disabled="loading">
            <span x-show="!loading">选择文件夹</span>
            <span x-show="loading">加载中...</span>
        </button>
        <button type="button" class="btn-folder danger" @click="unbindFolder()" x-show="binding" :disabled="loading">
            解除绑定
        </button>
    </div>
    
    <!-- 文件夹浏览器模态框 -->
    <div x-show="showBrowser" x-cloak class="folder-browser-modal" @click.self="closeBrowser()">
        <div class="folder-browser-content">
            <div class="folder-browser-header">
                <h2>选择文件夹</h2>
                <button type="button" class="folder-browser-close" @click="closeBrowser()">×</button>
            </div>
            
            <div class="folder-browser-body">
                <!-- 当前路径 -->
                <div x-show="currentPath" class="folder-browser-path" x-text="currentPath || '根目录'"></div>
                
                <!-- 导航按钮 -->
                <div class="folder-browser-nav">
                    <button type="button" class="btn-folder" @click="browseFolder(parentPath)" x-show="parentPath" :disabled="loading">
                        ← 返回上级
                    </button>
                    <button type="button" class="btn-folder" @click="browseFolder(null)" :disabled="loading">
                        🏠 根目录
                    </button>
                    <button type="button" class="btn-folder select" @click="selectFolder(currentPath)" x-show="currentPath" :disabled="loading">
                        ✓ 选择当前文件夹
                    </button>
                </div>
                
                <!-- 错误信息 -->
                <div x-show="error" class="folder-browser-error" x-text="error"></div>
                
                <!-- 加载中 -->
                <div x-show="loading" class="folder-browser-loading">
                    加载中...
                </div>
                
                <!-- 文件夹列表 -->
                <div x-show="!loading && entries.length > 0" class="folder-list">
                    <template x-for="entry in entries" :key="entry.path">
                        <div class="folder-item">
                            <span class="folder-item-icon">📁</span>
                            <span class="folder-item-name" x-text="entry.name"></span>
                            <div class="folder-item-actions">
                                <button type="button" class="folder-item-btn" @click="browseFolder(entry.path)">
                                    打开
                                </button>
                                <button type="button" class="folder-item-btn select" @click="selectFolder(entry.path)">
                                    选择
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
                
                <!-- 空状态 -->
                <div x-show="!loading && entries.length === 0 && !error" class="folder-browser-empty">
                    此文件夹为空
                </div>
            </div>
        </div>
    </div>
</div>
{% endif %}

<script>
(function() {
    var submitRow = document.querySelector('.submit-row');
    if (!submitRow) return;
    
    // 允许创建案件的合同类型
    var allowedTypes = ['civil', 'criminal', 'administrative', 'labor', 'intl'];
    
    {% if original %}
    // 保存并复制按钮（仅编辑时显示）
    var duplicateBtn = document.createElement('input');
    duplicateBtn.type = 'submit';
    duplicateBtn.value = '保存并复制';
    duplicateBtn.name = '_save_and_duplicate';
    duplicateBtn.className = '';
    {% endif %}
    
    // 保存并创建案件按钮（新建和编辑都显示）
    var createCaseBtn = document.createElement('input');
    createCaseBtn.type = 'submit';
    createCaseBtn.value = '保存并创建案件';
    createCaseBtn.name = '_save_and_create_case';
    createCaseBtn.className = '';
    
    // 检查当前合同类型是否允许创建案件
    function updateCreateCaseButton() {
        var caseTypeSelect = document.getElementById('id_case_type');
        if (caseTypeSelect) {
            var currentType = caseTypeSelect.value;
            createCaseBtn.disabled = allowedTypes.indexOf(currentType) === -1;
            if (createCaseBtn.disabled) {
                createCaseBtn.title = '仅民商事、刑事、行政、劳动仲裁、商事仲裁类型的合同可创建案件';
                createCaseBtn.style.opacity = '0.5';
                createCaseBtn.style.cursor = 'not-allowed';
            } else {
                createCaseBtn.title = '';
                createCaseBtn.style.opacity = '1';
                createCaseBtn.style.cursor = 'pointer';
            }
        }
    }
    
    // 初始化按钮状态
    updateCreateCaseButton();
    
    // 监听合同类型变化
    var caseTypeSelect = document.getElementById('id_case_type');
    if (caseTypeSelect) {
        caseTypeSelect.addEventListener('change', updateCreateCaseButton);
    }
    
    // 插入按钮
    var deleteBox = submitRow.querySelector('.deletelink-box');
    if (deleteBox) {
        submitRow.insertBefore(createCaseBtn, deleteBox);
        {% if original %}
        submitRow.insertBefore(duplicateBtn, deleteBox);
        {% endif %}
    } else {
        {% if original %}
        submitRow.appendChild(duplicateBtn);
        {% endif %}
        submitRow.appendChild(createCaseBtn);
    }
})();
</script>
{% endblock %}
