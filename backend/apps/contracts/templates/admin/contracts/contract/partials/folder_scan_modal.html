<div class="modal-overlay" x-show="isOpen" x-cloak @click.self="closeModal()">
    <div class="modal-dialog fm-scan-modal">
        <div class="modal-header">
            <h3>{</h3>
            <button type="button" class="modal-close" @click="closeModal()">&times;</button>
        </div>

        <div class="modal-body fm-scan-body">
            <div class="fm-scope-card" x-show="!isScanning">
                <div class="fm-scope-title">{</div>
                <div class="fm-scope-desc">
                    {
                </div>
                <div class="fm-scope-root" x-show="scanRootPath">
                    <span>{</span>
                    <code x-text="scanRootPath"></code>
                    <button type="button" class="fm-open-folder-btn"
                            :disabled="!scanRootPath"
                            @click="openFolder()"
                            title="{">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </button>
                </div>
                <div class="fm-scope-row" style="display:none;">
                    <label class="fm-radio-item">
                        <input type="radio" value="all" x-model="scanScopeMode">
                        <span>{</span>
                    </label>
                    <label class="fm-radio-item">
                        <input type="radio" value="subfolder" x-model="scanScopeMode" :disabled="!hasSubfolderOptions">
                        <span>{</span>
                    </label>
                </div>
                <div class="fm-scope-select" x-show="scanScopeMode === 'subfolder'">
                    <select x-model="scanSubfolder" :disabled="!hasSubfolderOptions || isLoadingSubfolders">
                        <option value="">{</option>
                        <template x-for="folder in scanSubfolderOptions" :key="folder.relative_path">
                            <option :value="folder.relative_path" x-text="folder.display_name || folder.relative_path"></option>
                        </template>
                    </select>
                    <p class="fm-scope-hint" x-show="isLoadingSubfolders">{</p>
                    <p class="fm-scope-hint" x-show="!isLoadingSubfolders && !hasSubfolderOptions">
                        {
                    </p>
                </div>
            </div>

            <div class="fm-scan-actions">
                <button type="button" class="btn btn-primary" :disabled="isScanning || isLoadingSubfolders" @click="startScan(false)">{</button>
                <button type="button" class="btn btn-secondary" :disabled="isScanning || isLoadingSubfolders" @click="startScan(true)">{</button>
            </div>

            <div class="fm-scan-status" x-show="scanStatusText">
                <span class="fm-status-pill" :class="scanStatusClass" x-text="scanStatusText"></span>
                <span class="fm-scan-file" x-show="scanCurrentFile" x-text="scanCurrentFile"></span>
            </div>

            <div class="fm-scan-progress" x-show="isScanning">
                <div class="fm-progress-track">
                    <div class="fm-progress-bar" :style="`width: ${scanProgress}%`"></div>
                </div>
                <div class="fm-progress-text" x-text="`${scanProgress}%`"></div>
            </div>

            <div class="fm-scan-empty" x-show="!isScanning && scanSessionId && !visibleCandidates.length">
                {
            </div>

            <div class="fm-scan-table-wrap" x-show="visibleCandidates.length">
                <table class="fm-scan-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">{</th>
                            <th>{</th>
                            <th style="width: 180px;">{</th>
                            <th style="width: 180px;">{</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="candidate in visibleCandidates" :key="candidate.source_path">
                            <tr>
                                <td><input type="checkbox" x-model="candidate.selected" /></td>
                                <td>
                                    <div class="fm-file-cell">
                                        <span x-text="candidate.filename" :class="{ 'fm-file-dimmed': candidate.already_imported }"></span>
                                        <span class="fm-docx-badge" x-show="candidate.is_docx" title="{">docx→PDF</span>
                                        <span class="fm-imported-badge" x-show="candidate.already_imported">{</span>
                                        <span class="fm-file-reason" x-show="candidate.reason" x-text="candidate.reason"></span>
                                    </div>
                                </td>
                                <td>
                                    <select x-model="candidate.category">
                                        <option value="contract_original">{</option>
                                        <option value="supplementary_agreement">{</option>
                                        <option value="invoice">{</option>
                                        <option value="supervision_card">{</option>
                                        <option value="case_material">{</option>
                                    </select>
                                </td>
                                <td>
                                    <!-- 案件材料才显示归档清单项下拉 -->
                                    <template x-if="isCaseMaterial(candidate)">
                                        <select @change="selectArchiveItem(candidate, $event.target.value)"
                                                class="fm-archive-select"
                                                :data-current="candidate.archive_item_code || ''">
                                            <option value="" :selected="!candidate.archive_item_code">{</option>
                                            <template x-for="opt in archiveItemOptions" :key="opt.code">
                                                <option :value="opt.code" :selected="candidate.archive_item_code === opt.code" x-text="opt.name"></option>
                                            </template>
                                        </select>
                                    </template>
                                    <span x-show="!isCaseMaterial(candidate)" class="fm-archive-na">—</span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- 工作日志建议区域 -->
            <div class="fm-worklog-section" x-show="workLogSuggestions.length > 0 && !isScanning">
                <div class="fm-worklog-header">
                    <span class="fm-worklog-title">{</span>
                    <button type="button" class="btn btn-secondary btn-sm" @click="addWorkLogEntry()">{</button>
                </div>
                <div class="fm-worklog-list">
                    <template x-for="(entry, index) in workLogSuggestions" :key="index">
                        <div class="fm-worklog-row">
                            <input type="date" x-model="entry.date" class="fm-worklog-date" />
                            <input type="text" x-model="entry.content" class="fm-worklog-content" placeholder="{" />
                            <button type="button" class="fm-worklog-remove" @click="removeWorkLogEntry(index)">&times;</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" @click="closeModal()">{</button>
            <button type="button" class="btn btn-primary" :disabled="isScanning || isConfirming || !selectedCount" @click="confirmImport()">{</button>
        </div>
    </div>
</div>

<style>
    /* docx 徽章 */
    .fm-docx-badge {
        display: inline-block;
        font-size: 11px;
        background: #e8f4fd;
        color: #1890ff;
        padding: 1px 6px;
        border-radius: 3px;
        margin-left: 6px;
        vertical-align: middle;
    }

    /* 归档清单项下拉 */
    .fm-archive-select {
        width: 100%;
        font-size: 13px;
        padding: 2px 4px;
        border: 1px solid #d9d9d9;
        border-radius: 3px;
    }

    .fm-archive-na {
        color: #bbb;
    }

    /* 工作日志区域 */
    .fm-worklog-section {
        margin-top: 16px;
        border-top: 1px solid #eee;
        padding-top: 12px;
    }

    .fm-worklog-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
    }

    .fm-worklog-title {
        font-weight: 600;
        font-size: 14px;
    }

    .fm-worklog-list {
        max-height: 240px;
        overflow-y: auto;
    }

    .fm-worklog-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
    }

    .fm-worklog-date {
        width: 140px;
        padding: 4px 6px;
        font-size: 13px;
        border: 1px solid #d9d9d9;
        border-radius: 3px;
    }

    .fm-worklog-content {
        flex: 1;
        padding: 4px 6px;
        font-size: 13px;
        border: 1px solid #d9d9d9;
        border-radius: 3px;
    }

    .fm-worklog-remove {
        background: none;
        border: none;
        color: #ff4d4f;
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
    }

    .btn-sm {
        font-size: 12px;
        padding: 2px 8px;
    }

    /* 已导入徽章 */
    .fm-imported-badge {
        display: inline-block;
        font-size: 11px;
        background: #f0f0f0;
        color: #999;
        padding: 1px 6px;
        border-radius: 3px;
        margin-left: 6px;
        vertical-align: middle;
    }

    .fm-file-dimmed {
        color: #aaa;
        text-decoration: line-through;
    }
</style>
