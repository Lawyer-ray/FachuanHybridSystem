<!-- 完成步骤组件 - Modern Light Theme -->
<div class="p-12 text-center">
    <!-- 成功图标 -->
    <div class="success-icon-v3 inline-block mb-8">
        <div class="w-24 h-24 bg-gradient-to-br from-emerald-400 to-green-500 rounded-3xl flex items-center justify-center shadow-xl shadow-emerald-500/30 mx-auto relative z-10">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
    </div>

    <h2 class="text-3xl font-bold text-slate-800 mb-3">立案完成</h2>
    <p class="text-slate-500 text-lg mb-10">恭喜！所有信息已成功创建</p>

    <!-- 创建结果摘要 - Bento Grid -->
    <div class="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
        <!-- 当事人 -->
        <div class="bento-card-v3 text-left">
            <div class="flex items-center gap-3 mb-3">
                <div class="icon-wrapper primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                </div>
                <div>
                    <div class="text-3xl font-bold text-slate-800" x-text="selectedClients.length"></div>
                    <div class="text-sm text-slate-500">当事人</div>
                </div>
            </div>
            <div class="text-xs text-slate-400">已关联到合同</div>
        </div>

        <!-- 合同 -->
        <div class="bento-card-v3 text-left">
            <div class="flex items-center gap-3 mb-3">
                <div class="icon-wrapper accent">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <div>
                    <div class="text-3xl font-bold text-slate-800">1</div>
                    <div class="text-sm text-slate-500">合同</div>
                </div>
            </div>
            <div class="text-sm text-slate-600 truncate font-medium" x-text="createdContract?.name || contract.name"></div>
        </div>

        <!-- 案件 -->
        <div class="bento-card-v3 text-left" x-show="needsCaseStep && createdCase">
            <div class="flex items-center gap-3 mb-3">
                <div class="icon-wrapper success">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
                <div>
                    <div class="text-3xl font-bold text-slate-800">1</div>
                    <div class="text-sm text-slate-500">案件</div>
                </div>
            </div>
            <div class="text-sm text-slate-600 truncate font-medium" x-text="createdCase?.name || caseInfo.name"></div>
        </div>
    </div>

    <!-- 操作按钮 -->
    <div class="flex items-center justify-center gap-4">
        <a :href="createdContract ? `/admin/contracts/contract/${createdContract.id}/change/` : '/admin/contracts/contract/'"
           class="btn-secondary-v3 cursor-pointer">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
            </svg>
            查看合同
        </a>
        <button @click="resetWizard()" class="btn-primary-v3 cursor-pointer">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
            </svg>
            继续立案
        </button>
    </div>
</div>
