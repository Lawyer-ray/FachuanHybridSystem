<!-- 步骤一：当事人选择/创建组件 - Modern Light Theme -->
<div class="flex flex-col h-full">
    <!-- 头部区域 -->
    <div class="p-8 border-b border-slate-100">
        <div class="flex items-start justify-between">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">选择当事人</h2>
                <p class="mt-1 text-slate-500">从已有当事人中选择，或创建新的当事人</p>
            </div>
            <button @click="toggleNewClientForm()"
                    class="btn-primary-v3 cursor-pointer">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
                新建当事人
            </button>
        </div>

        <!-- 搜索和筛选 -->
        <div class="mt-6 flex items-center gap-4 flex-wrap">
            <div class="flex-1 min-w-[280px] relative">
                <input type="text"
                       x-model="searchQuery"
                       @input.debounce.300ms="clientsPage = 1; searchClients()"
                       placeholder="搜索姓名、电话、身份证号..."
                       class="form-input-v3 pl-11">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <button x-show="searchQuery" @click="clearSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- 我方/对方筛选 -->
            <div class="inline-flex items-center gap-1 bg-slate-100 rounded-lg p-1">
                <button @click="ourClientFilter = ''; clientsPage = 1"
                        class="px-3 py-1.5 text-sm font-medium rounded-md transition-all cursor-pointer"
                        :class="ourClientFilter === '' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-600 hover:text-slate-800'">
                    全部
                </button>
                <button @click="ourClientFilter = true; clientsPage = 1"
                        class="px-3 py-1.5 text-sm font-medium rounded-md transition-all cursor-pointer"
                        :class="ourClientFilter === true ? 'bg-white text-primary-600 shadow-sm' : 'text-slate-600 hover:text-slate-800'">
                    我方
                </button>
                <button @click="ourClientFilter = false; clientsPage = 1"
                        class="px-3 py-1.5 text-sm font-medium rounded-md transition-all cursor-pointer"
                        :class="ourClientFilter === false ? 'bg-white text-slate-600 shadow-sm' : 'text-slate-600 hover:text-slate-800'">
                    对方
                </button>
            </div>

            <!-- 类型筛选 -->
            <div class="inline-flex items-center gap-1 bg-slate-100 rounded-lg p-1">
                <button @click="clientTypeFilter = ''; clientsPage = 1"
                        class="px-3 py-1.5 text-sm font-medium rounded-md transition-all cursor-pointer"
                        :class="clientTypeFilter === '' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-600 hover:text-slate-800'">
                    全部
                </button>
                <button @click="clientTypeFilter = 'natural'; clientsPage = 1"
                        class="px-3 py-1.5 text-sm font-medium rounded-md transition-all cursor-pointer"
                        :class="clientTypeFilter === 'natural' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-600 hover:text-slate-800'">
                    自然人
                </button>
                <button @click="clientTypeFilter = 'legal'; clientsPage = 1"
                        class="px-3 py-1.5 text-sm font-medium rounded-md transition-all cursor-pointer"
                        :class="clientTypeFilter === 'legal' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-600 hover:text-slate-800'">
                    法人
                </button>
            </div>

            <!-- 视图切换 -->
            <div class="inline-flex items-center gap-1 bg-slate-100 rounded-lg p-1">
                <button @click="viewMode = 'list'"
                        class="p-2 rounded-md transition-all cursor-pointer"
                        :class="viewMode === 'list' ? 'bg-white text-primary-600 shadow-sm' : 'text-slate-600 hover:text-slate-800'"
                        title="列表视图">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                    </svg>
                </button>
                <button @click="viewMode = 'card'"
                        class="p-2 rounded-md transition-all cursor-pointer"
                        :class="viewMode === 'card' ? 'bg-white text-primary-600 shadow-sm' : 'text-slate-600 hover:text-slate-800'"
                        title="卡片视图">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 已选择的当事人 - 小卡片网格 -->
    <div x-show="selectedClients.length > 0"
         x-transition
         class="px-8 py-4 bg-gradient-to-r from-primary-50 to-accent-50/30 border-b border-primary-100">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
                <span class="text-sm font-semibold text-primary-700">合同当事人</span>
                <span class="px-2.5 py-1 bg-primary-500 text-white text-xs font-bold rounded-full min-w-[1.5rem] text-center" x-text="selectedClients.length"></span>
            </div>
            <button @click="clearAllSelectedClients()"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-red-600 hover:text-white hover:bg-red-500 border border-red-200 hover:border-red-500 rounded-lg transition-all cursor-pointer">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
                清空全部
            </button>
        </div>
        <!-- 小卡片网格布局 -->
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
            <template x-for="(item, index) in selectedClients" :key="item.client.id">
                <div class="relative bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-all group">
                    <!-- 顶部色条 -->
                    <div class="h-1 rounded-t-xl"
                         :class="item.client.is_our_client ? 'bg-gradient-to-r from-primary-500 to-accent-400' : 'bg-slate-300'"></div>
                    <!-- 删除按钮 -->
                    <button @click="removeSelectedClient(index)"
                            class="absolute top-2 right-2 w-6 h-6 flex items-center justify-center rounded-full bg-slate-100 text-slate-400 hover:text-white hover:bg-red-500 transition-all cursor-pointer opacity-0 group-hover:opacity-100"
                            title="移除">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                    <!-- 卡片内容 -->
                    <div class="p-3">
                        <!-- 名称和标签 -->
                        <div class="mb-2">
                            <h4 class="text-sm font-semibold text-slate-800 truncate pr-6" x-text="item.client.name"></h4>
                            <div class="flex items-center gap-1.5 mt-1.5 flex-wrap">
                                <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium"
                                      :class="item.client.client_type === 'natural' ? 'bg-blue-50 text-blue-600' : 'bg-purple-50 text-purple-600'"
                                      x-text="item.client.client_type === 'natural' ? '自然人' : '法人'">
                                </span>
                                <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium"
                                      :class="item.client.is_our_client ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500'"
                                      x-text="item.client.is_our_client ? '我方' : '对方'">
                                </span>
                            </div>
                        </div>
                        <!-- 联系信息 -->
                        <div class="text-[11px] text-slate-500 truncate mb-2" x-show="item.client.phone || item.client.id_number">
                            <span x-text="item.client.phone || item.client.id_number"></span>
                        </div>
                        <!-- 角色选择 -->
                        <select x-model="item.role"
                                @change="saveToSession()"
                                @click.stop
                                class="w-full px-2 py-1 text-xs font-medium border border-slate-200 rounded-lg bg-slate-50 hover:border-primary-300 focus:border-primary-500 focus:ring-1 focus:ring-primary-100 transition-all cursor-pointer">
                            <option value="PRINCIPAL">委托人</option>
                            <option value="BENEFICIARY">受益人</option>
                            <option value="OPPOSING">对方当事人</option>
                        </select>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- 当事人列表区域 -->
    <div class="flex-1 overflow-hidden">
        <div class="h-full overflow-y-auto custom-scrollbar-v3 p-8">
            <!-- 加载状态 -->
            <div x-show="clientsLoading" class="flex items-center justify-center py-12">
                <div class="loading-spinner-v3"></div>
            </div>

            <!-- 列表视图 -->
            <template x-if="viewMode === 'list'">
                <div>
                    <div x-show="!clientsLoading && filteredClients.length > 0" class="flex items-center gap-4 px-4 py-2 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                        <div class="flex-shrink-0 w-5"></div>
                        <div class="flex-shrink-0 w-10"></div>
                        <div class="flex-1 min-w-0">当事人</div>
                        <div class="hidden sm:block flex-shrink-0 w-32">电话</div>
                        <div class="hidden lg:block flex-shrink-0 w-48">证件号码</div>
                    </div>

                    <div x-show="!clientsLoading && filteredClients.length > 0" class="space-y-2">
                        <template x-for="client in paginatedClients" :key="client.id">
                            <div class="client-card-v3 group flex items-center gap-4 px-4 py-3"
                                 :class="isClientSelected(client) ? 'selected' : ''"
                                 @click="selectClient(client)">
                                <div class="flex-shrink-0">
                                    <div class="w-5 h-5 rounded border-2 flex items-center justify-center transition-all"
                                         :class="isClientSelected(client) ? 'bg-primary-500 border-primary-500' : 'border-slate-300 group-hover:border-slate-400'">
                                        <template x-if="isClientSelected(client)">
                                            <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                                            </svg>
                                        </template>
                                    </div>
                                </div>
                                <div class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center"
                                     :class="client.is_our_client ? 'bg-gradient-to-br from-primary-500 to-accent-400' : 'bg-slate-200'">
                                    <svg class="w-5 h-5" :class="client.is_our_client ? 'text-white' : 'text-slate-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path x-show="client.client_type === 'natural'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                        <path x-show="client.client_type !== 'natural'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                                    </svg>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2">
                                        <h4 class="text-sm font-semibold text-slate-800 truncate" x-text="client.name"></h4>
                                        <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium"
                                              :class="client.is_our_client ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-600'"
                                              x-text="client.is_our_client ? '我方' : '对方'">
                                        </span>
                                        <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium"
                                              :class="client.client_type === 'natural' ? 'bg-blue-50 text-blue-700' : 'bg-purple-50 text-purple-700'"
                                              x-text="client.client_type === 'natural' ? '自然人' : (client.client_type === 'legal' ? '法人' : '非法人组织')">
                                        </span>
                                    </div>
                                </div>
                                <div class="hidden sm:block flex-shrink-0 w-32 text-sm text-slate-600" x-text="client.phone || '-'"></div>
                                <div class="hidden lg:block flex-shrink-0 w-48 text-sm text-slate-500 truncate" x-text="client.id_number || '-'"></div>
                                <div class="flex-shrink-0">
                                    <button @click="openEditClientForm(client, $event)"
                                            class="p-2 text-slate-400 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition-all opacity-0 group-hover:opacity-100 cursor-pointer">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- 卡片视图 -->
            <template x-if="viewMode === 'card'">
                <div x-show="!clientsLoading && filteredClients.length > 0"
                     class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <template x-for="client in paginatedClients" :key="client.id">
                        <div class="client-card-v3 group relative"
                             :class="isClientSelected(client) ? 'selected' : ''"
                             @click="selectClient(client)">
                            <div class="h-1.5 rounded-t-xl -mx-[1px] -mt-[1px]" :class="client.is_our_client ? 'bg-gradient-to-r from-primary-500 to-accent-400' : 'bg-slate-200'"></div>
                            <div class="absolute top-4 right-3 flex items-center gap-2">
                                <button @click="openEditClientForm(client, $event)"
                                        class="w-7 h-7 rounded-lg flex items-center justify-center bg-slate-100 text-slate-400 hover:text-primary-600 hover:bg-primary-50 transition-all opacity-0 group-hover:opacity-100 cursor-pointer">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                    </svg>
                                </button>
                                <div class="w-7 h-7 rounded-lg flex items-center justify-center transition-all"
                                     :class="isClientSelected(client) ? 'bg-primary-500' : 'bg-slate-100 group-hover:bg-slate-200'">
                                    <template x-if="isClientSelected(client)">
                                        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                                        </svg>
                                    </template>
                                </div>
                            </div>
                            <div class="p-4 pt-3">
                                <div class="flex items-center gap-3 mb-3">
                                    <div class="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0"
                                         :class="client.is_our_client ? 'bg-gradient-to-br from-primary-100 to-accent-100' : 'bg-slate-100'">
                                        <svg class="w-6 h-6" :class="client.is_our_client ? 'text-primary-600' : 'text-slate-500'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path x-show="client.client_type === 'natural'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                            <path x-show="client.client_type !== 'natural'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                                        </svg>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <h4 class="text-sm font-semibold text-slate-800 truncate" x-text="client.name"></h4>
                                        <div class="flex items-center gap-2 mt-1">
                                            <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium"
                                                  :class="client.is_our_client ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-600'"
                                                  x-text="client.is_our_client ? '我方' : '对方'">
                                            </span>
                                            <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium"
                                                  :class="client.client_type === 'natural' ? 'bg-blue-50 text-blue-700' : 'bg-purple-50 text-purple-700'"
                                                  x-text="client.client_type === 'natural' ? '自然人' : (client.client_type === 'legal' ? '法人' : '非法人组织')">
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <div class="space-y-2 text-sm">
                                    <div class="flex items-center text-slate-600" x-show="client.phone">
                                        <svg class="w-4 h-4 mr-2 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                                        </svg>
                                        <span x-text="client.phone"></span>
                                    </div>
                                    <div class="flex items-center text-slate-500" x-show="client.id_number">
                                        <svg class="w-4 h-4 mr-2 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V4a2 2 0 114 0v2m-4 0a2 2 0 104 0"></path>
                                        </svg>
                                        <span class="truncate" x-text="client.id_number"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- 分页控件 -->
            <div x-show="!clientsLoading && filteredClients.length > 0 && clientsTotalPages > 1"
                 class="flex items-center justify-between mt-6 pt-4 border-t border-slate-100">
                <div class="text-sm text-slate-500">
                    共 <span x-text="filteredClients.length" class="font-semibold text-slate-700"></span> 条，
                    第 <span x-text="clientsPage" class="font-semibold text-slate-700"></span>/<span x-text="clientsTotalPages" class="font-semibold text-slate-700"></span> 页
                </div>
                <div class="flex items-center gap-2">
                    <button @click="prevClientsPage()"
                            :disabled="clientsPage <= 1"
                            class="btn-secondary-v3 !py-1.5 !px-3 text-sm"
                            :class="clientsPage <= 1 ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'">
                        上一页
                    </button>
                    <template x-for="page in clientsTotalPages" :key="page">
                        <button @click="goToClientsPage(page)"
                                x-show="page === 1 || page === clientsTotalPages || (page >= clientsPage - 1 && page <= clientsPage + 1)"
                                class="w-8 h-8 text-sm font-medium rounded-lg transition-all cursor-pointer"
                                :class="page === clientsPage ? 'bg-primary-500 text-white' : 'text-slate-600 hover:bg-slate-100'"
                                x-text="page">
                        </button>
                    </template>
                    <button @click="nextClientsPage()"
                            :disabled="clientsPage >= clientsTotalPages"
                            class="btn-secondary-v3 !py-1.5 !px-3 text-sm"
                            :class="clientsPage >= clientsTotalPages ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'">
                        下一页
                    </button>
                </div>
            </div>

            <!-- 空状态 -->
            <div x-show="!clientsLoading && filteredClients.length === 0" class="flex flex-col items-center justify-center py-16">
                <div class="w-20 h-20 bg-slate-100 rounded-2xl flex items-center justify-center mb-4">
                    <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
