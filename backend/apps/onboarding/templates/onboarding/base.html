<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}立案引导系统{% endblock %}</title>

    {% load static %}

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js (本地) -->
    <script defer src="{% static 'admin/js/alpine.js' %}"></script>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="{% static 'onboarding/css/wizard.css' %}">

    <!-- CSRF Token -->
    <meta name="csrf-token" content="{{ csrf_token }}">

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        },
                        accent: {
                            400: '#f472b6',
                            500: '#ec4899',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased bg-mesh-v3">
    {% block content %}
    {% endblock %}

    {% block extra_js %}
    {% endblock %}
</body>
</html>
