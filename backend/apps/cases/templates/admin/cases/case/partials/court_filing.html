<!-- 一张网立案标签页 -->
<div x-data="courtFilingApp()">
    <div class="info-grid">
        <div class="info-card" style="grid-column: 1 / -1;">
            <div class="card-header">
                <span class="card-icon">🏛️</span>
                <h3 class="card-title">{</h3>
            </div>

            <div x-show="loading" style="text-align: center; padding: 24px;">
                <span class="spinner"></span> {
            </div>

            <div x-show="!loading">
                <!-- 案件信息摘要 -->
                <div style="background: #f8fafc; border-radius: 8px; padding: 16px; margin-bottom: 16px;">
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; font-size: 13px;">
                        <div>
                            <span style="color: #6b7280;">{：</span>
                            <span style="font-weight: 500;" x-text="caseInfo.cause_of_action || '-'"></span>
                        </div>
                        <div>
                            <span style="color: #6b7280;">{：</span>
                            <span style="font-weight: 500;" x-text="caseInfo.court_name || '{'"></span>
                        </div>
                        <div>
                            <span style="color: #6b7280;">{：</span>
                            <span style="font-weight: 500;" x-text="caseInfo.target_amount ? '¥' + caseInfo.target_amount : '-'"></span>
                        </div>
                    </div>
                    <div style="margin-top: 10px; font-size: 12px; color: #475569;">
                        <span style="color: #6b7280;">{：</span>
                        <span x-text="caseInfo.suggested_filing_type === 'execution' ? '{' : '{'"></span>
                    </div>
                    <div style="margin-top: 10px; font-size: 12px; color: #475569; display: flex; align-items: center; gap: 14px;">
                        <span style="color: #6b7280;">{：</span>
                        <label x-show="caseInfo.has_http_plugin" style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                            <input type="radio" name="filing_engine" value="api" x-model="filingEngine" :disabled="executing">
                            <span>HTTP主链路（{）</span>
                        </label>
                        <label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                            <input type="radio" name="filing_engine" value="playwright" x-model="filingEngine" :disabled="executing">
                            <span x-text="caseInfo.has_http_plugin ? 'Playwright' : 'Playwright（{）'"></span>
                        </label>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div style="margin-bottom: 16px;">
                    <button type="button" class="btn btn-primary"
                            :class="{ 'btn-disabled': executing || !caseInfo.court_name || !caseInfo.our_party_is_plaintiff_side || !caseInfo.has_court_credential }"
                            :disabled="executing || !caseInfo.court_name || !caseInfo.our_party_is_plaintiff_side || !caseInfo.has_court_credential"
                            @click="executeCourtFiling()">
                        <span x-show="!executing">🚀 {</span>
                        <span x-show="executing"><span class="spinner"></span> {</span>
                    </button>
                    <span x-show="!caseInfo.court_name"
                          style="margin-left: 12px; font-size: 12px; color: #dc2626;">
                        {
                    </span>
                    <span x-show="caseInfo.court_name && !caseInfo.our_party_is_plaintiff_side"
                          style="margin-left: 12px; font-size: 12px; color: #dc2626;">
                        {
                    </span>
                    <span x-show="caseInfo.court_name && caseInfo.our_party_is_plaintiff_side && !caseInfo.has_court_credential"
                          style="margin-left: 12px; font-size: 12px; color: #dc2626;">
                        {
                    </span>
                </div>

                <!-- 执行结果 -->
                <template x-if="lastResult">
                    <div :style="lastResult.success ? 'background:#f0fdf4;border:1px solid #86efac;' : 'background:#fef2f2;border:1px solid #fca5a5;'"
                         style="border-radius:8px;padding:12px;margin-bottom:16px;">
                        <span x-show="lastResult.success" style="color:#15803d;">✓ <span x-text="lastResult.message"></span></span>
                        <span x-show="!lastResult.success" style="color:#dc2626;">✗ <span x-text="lastResult.message"></span></span>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
    function courtFilingApp() {
        return {
            caseId: {{ case.pk }},
            caseInfo: {},
            loading: false,
            executing: false,
            lastResult: null,
            filingEngine: 'playwright',

            async init() {
                await this.loadCaseInfo();
            },

            async loadCaseInfo() {
                this.loading = true;
                try {
                    const resp = await fetch(`/api/v1/court-filing/case-info/${this.caseId}`);
                    if (resp.ok) {
                        this.caseInfo = await resp.json();
                        this.filingEngine = this.caseInfo.default_filing_engine || 'api';
                    }
                } catch (e) {
                    console.error('loadCaseInfo error:', e);
                } finally {
                    this.loading = false;
                }
            },

            async executeCourtFiling() {
                if (!this.caseId || !this.caseInfo.court_name) return;
                this.executing = true;
                this.lastResult = null;
                try {
                    const resp = await fetch('/api/v1/court-filing/execute', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
                        },
                        body: JSON.stringify({
                            case_id: this.caseId,
                            filing_type: this.caseInfo.suggested_filing_type || 'civil',
                            filing_engine: this.filingEngine || 'api'
                        })
                    });
                    const data = await resp.json();
                    this.lastResult = data;
                    if (data.session_id) {
                        this.pollSession(data.session_id);
                    } else {
                        this.executing = false;
                    }
                } catch (e) {
                    console.error('executeCourtFiling error:', e);
                    this.lastResult = { success: false, message: e.message };
                    this.executing = false;
                }
            },

            async pollSession(sessionId) {
                const poll = async () => {
                    try {
                        const resp = await fetch(`/api/v1/court-filing/session/${sessionId}`);
                        if (resp.ok) {
                            const data = await resp.json();
                            this.lastResult = data;
                            if (data.status === 'in_progress') {
                                setTimeout(poll, 3000);
                                return;
                            }
                        }
                    } catch (e) {
                        console.error('pollSession error:', e);
                    }
                    this.executing = false;
                };
                setTimeout(poll, 3000);
            },
        };
    }
    </script>

    {% include "admin/cases/case/partials/court_guarantee.html" %}
</div>
