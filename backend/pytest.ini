[pytest]
django_find_project = false
DJANGO_SETTINGS_MODULE = apiSystem.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Test
python_functions = test_*
addopts =
    --reuse-db
    --import-mode=importlib
    --cov=apps
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=85
    -v
    --tb=short
    --strict-markers
    --ignore=tests/integration/cases/test_folder_binding_security.py
    --ignore=tests/unit/cases/test_cause_court_data_service.py
    --ignore=tests/unit/client/test_identity_doc_api.py
    --ignore=tests/unit/core/test_sensitive_data_filter.py
testpaths = tests
pythonpath = apiSystem .
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    anyio: marks tests as anyio async tests
    asyncio: marks tests as asyncio tests
    property: marks tests as property-based tests
    property_test: marks tests as property-based tests (alias)
