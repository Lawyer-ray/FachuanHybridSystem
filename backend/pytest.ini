[pytest]
django_find_project = false
DJANGO_SETTINGS_MODULE = apiSystem.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Test
python_functions = test_*
addopts =
    --reuse-db
    --import-mode=importlib
    --cov=apps
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=85
    -v
    --tb=short
    --strict-markers
# 覆盖率阈值策略：
# - 全局基线（tests/unit 全量）：85%（backend-unit-coverage CI job 与本地 pytest.ini 保持一致）
# - 专项模块（apps.core + org policy）：90%（backend-coverage CI job 单独配置）
testpaths = tests
pythonpath = apiSystem .
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    anyio: marks tests as anyio async tests
    asyncio: marks tests as asyncio tests
    property: marks tests as property-based tests
    property_test: marks tests as property-based tests (alias)
