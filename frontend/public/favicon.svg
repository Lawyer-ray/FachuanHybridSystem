<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg9" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </radialGradient>
    <linearGradient id="petal" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg9)"/>
  <!-- 花瓣/涡轮叶片 -->
  <ellipse cx="512" cy="350" rx="60" ry="150" fill="url(#petal)" opacity="0.8" filter="url(#glow9)"/>
  <ellipse cx="512" cy="350" rx="60" ry="150" fill="url(#petal)" opacity="0.8" filter="url(#glow9)" transform="rotate(60 512 512)"/>
  <ellipse cx="512" cy="350" rx="60" ry="150" fill="url(#petal)" opacity="0.8" filter="url(#glow9)" transform="rotate(120 512 512)"/>
  <ellipse cx="512" cy="350" rx="60" ry="150" fill="url(#petal)" opacity="0.8" filter="url(#glow9)" transform="rotate(180 512 512)"/>
  <ellipse cx="512" cy="350" rx="60" ry="150" fill="url(#petal)" opacity="0.8" filter="url(#glow9)" transform="rotate(240 512 512)"/>
  <ellipse cx="512" cy="350" rx="60" ry="150" fill="url(#petal)" opacity="0.8" filter="url(#glow9)" transform="rotate(300 512 512)"/>
  <!-- 中心 -->
  <circle cx="512" cy="512" r="60" fill="#1E1B4B" stroke="#A5B4FC" stroke-width="3"/>
  <circle cx="512" cy="512" r="35" fill="#6366F1" filter="url(#glow9)"/>
  <circle cx="512" cy="512" r="15" fill="#E0E7FF"/>
</svg>
