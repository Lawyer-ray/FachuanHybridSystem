name: backend-ci

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
  schedule:
    - cron: "0 2 * * *"

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repository hygiene
        run: |
          set -euo pipefail

          banned=$(git ls-files | grep -E '(^|/)(\.DS_Store|__pycache__/|[^/]+\.pyc)$' || true)
          if [ -n "${banned}" ]; then
            echo "Found banned tracked artifacts:"
            echo "${banned}"
            exit 1
          fi

          env_tracked=$(git ls-files | grep -E '(^|/)\.env(\.[^/]+)?$' | grep -v -E '(^|/)\.env\.example$' || true)
          if [ -n "${env_tracked}" ]; then
            echo "Found tracked .env files (do not commit secrets):"
            echo "${env_tracked}"
            exit 1
          fi

          media_tracked=$(git ls-files backend/media backend/apiSystem/media 2>/dev/null | grep -v '\.gitkeep$' || true)
          if [ -n "${media_tracked}" ]; then
            echo "Found tracked media artifacts (expected to be runtime-only):"
            echo "${media_tracked}"
            exit 1
          fi

          venv_tracked=$(git ls-files | grep -E '^(backend/)?(\.venv|venv(311|312)?)/' || true)
          if [ -n "${venv_tracked}" ]; then
            echo "Found tracked virtualenv files (do not commit venv):"
            echo "${venv_tracked}"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile Python
        run: uv run python -m compileall -q apps apiSystem

      - name: Pre-commit
        run: uv run pre-commit run --all-files

      - name: Lint (ruff, changed files)
        run: |
          set -euo pipefail
          base=""
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            base="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
          else
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${base}" ]; then
            echo "No base commit found, skipping ruff changed-files gate."
            exit 0
          fi
          files="$(git diff --name-only --diff-filter=ACMRT "${base}" HEAD | grep -E '^backend/apps/.*\.py$' | sed 's|^backend/||' || true)"
          if [ -z "${files}" ]; then
            echo "No changed backend/apps/*.py files."
            exit 0
          fi
          uv run ruff check ${files} --config ruff.toml

      - name: Lint (ruff, core + apiSystem)
        run: uv run ruff check apps/core apiSystem --config ruff.toml

      - name: Type check (mypy, changed files)
        env:
          PYTHONPATH: "apiSystem:."
        run: |
          set -euo pipefail
          base=""
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            base="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
          else
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${base}" ]; then
            echo "No base commit found, skipping mypy changed-files gate."
            exit 0
          fi
          files="$(git diff --name-only --diff-filter=ACMRT "${base}" HEAD | grep -E '^backend/apps/.*\.py$' | sed 's|^backend/||' || true)"
          if [ -z "${files}" ]; then
            echo "No changed backend/apps/*.py files."
            exit 0
          fi
          uv run mypy --config-file=mypy.ini --follow-imports=skip ${files}

      - name: Type check (mypy, curated gate)
        env:
          PYTHONPATH: "apiSystem:."
        run: |
          uv run mypy --config-file=mypy.ini --follow-imports=skip \
            apps/core/httpx_clients.py \
            apps/core/services/wiring.py \
            apps/core/protocols/common_protocols.py \
            apps/core/dto/auth.py \
            apps/core/infrastructure/throttling.py \
            apps/core/middleware_request_id.py \
            apps/core/exceptions_handlers.py \
            apiSystem/apiSystem/api.py

      - name: Tests (structure)
        env:
          DJANGO_DEBUG: "1"
          DATABASE_PATH: "/tmp/fachuan_ci.sqlite3"
          PYTHONPATH: "apiSystem:."
        run: uv run pytest -c pytest.ini --no-cov -q tests/structure/

      - name: Tests (unit)
        env:
          DJANGO_DEBUG: "1"
          DATABASE_PATH: "/tmp/fachuan_ci.sqlite3"
          PYTHONPATH: "apiSystem:."
        run: uv run pytest -c pytest.ini --no-cov -q tests/unit/

      - name: Smoke check (minimal)
        env:
          DJANGO_DEBUG: "1"
          DATABASE_PATH: "/tmp/fachuan_ci.sqlite3"
          PYTHONPATH: "apiSystem:."
        run: |
          uv run python apiSystem/manage.py smoke_check \
            --database-path /tmp/fachuan_ci.sqlite3 \
            --skip-admin \
            --skip-websocket \
            --skip-q

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

      - name: Static security scan (bandit)
        run: uv run bandit -r apps -q -ll -x "*/migrations/*,*/static/*,*/staticfiles/*,*/media/*,*/venv*/*,*/htmlcov/*"

  backend-ruff-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff, core + apiSystem)
        run: uv run ruff check apps/core apiSystem --config ruff.toml

  backend-mypy-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Type check (mypy, core + apiSystem)
        env:
          PYTHONPATH: "apiSystem:."
        run: |
          uv run mypy --config-file=mypy.ini --follow-imports=skip \
            apps/core/httpx_clients.py \
            apps/core/services/wiring.py \
            apps/core/protocols/common_protocols.py \
            apps/core/dto/auth.py \
            apps/core/config/validators/safe_expression_evaluator.py \
            apps/core/infrastructure/throttling.py \
            apps/core/middleware_request_id.py \
            apps/core/exceptions_handlers.py \
            apps/organization/services/organization_access_policy.py \
            apiSystem/apiSystem/api.py

  backend-unit-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Tests (unit + coverage gate)
        env:
          DJANGO_DEBUG: "1"
          DATABASE_PATH: "/tmp/fachuan_ci.sqlite3"
          PYTHONPATH: "apiSystem:."
        run: |
          uv run pytest -c pytest.ini -q -o addopts="--reuse-db --import-mode=importlib --cov=apps --cov-report=term-missing --cov-fail-under=75 --tb=short --strict-markers" tests/unit/

  backend-integration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Tests (integration smoke)
        env:
          DJANGO_DEBUG: "1"
          DATABASE_PATH: "/tmp/fachuan_ci.sqlite3"
          PYTHONPATH: "apiSystem:."
        run: uv run pytest -c pytest.ini --no-cov -q tests/integration/organization/

  backend-property-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Tests (property smoke)
        env:
          DJANGO_DEBUG: "1"
          DATABASE_PATH: "/tmp/fachuan_ci.sqlite3"
          PYTHONPATH: "apiSystem:."
          HYPOTHESIS_PROFILE: "default"
        run: uv run pytest -c pytest.ini --no-cov -q tests/property/core/test_exception_structure_properties.py

  backend-e2e-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Tests (e2e admin smoke)
        env:
          DJANGO_DEBUG: "1"
          DATABASE_PATH: "/tmp/fachuan_ci.sqlite3"
          PYTHONPATH: "apiSystem:."
        run: uv run pytest -c pytest.ini --no-cov -q tests/e2e/admin/test_smoke.py

  backend-mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Type check (mypy)
        env:
          PYTHONPATH: "apiSystem:."
        run: |
          uv run mypy --config-file=mypy.ini --follow-imports=skip \
            apps/core/auth.py \
            apps/core/infrastructure/throttling.py \
            apps/core/infrastructure/cache.py \
            apps/core/middleware.py \
            apps/core/middleware_request_id.py \
            apps/organization/services/auth_service.py \
            apps/automation/services/token/cache_manager.py \
            apps/automation/utils/logging_mixins/common.py

  backend-mypy-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Type check (mypy strict - all apps)
        env:
          PYTHONPATH: "apiSystem:."
        run: uv run mypy apps/ --strict

  backend-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Coverage (apps.core + org policy)
        env:
          DJANGO_DEBUG: "1"
          DATABASE_PATH: "/tmp/fachuan_ci.sqlite3"
          PYTHONPATH: "apiSystem:."
        run: |
          uv run pytest -c pytest.ini -o addopts="" \
            --reuse-db --import-mode=importlib \
            --cov=apps.core.infrastructure.throttling \
            --cov=apps.core.config.validators.safe_expression_evaluator \
            --cov=apps.core.middleware_request_id \
            --cov=apps.core.exceptions_handlers \
            --cov=apps.organization.services.organization_access_policy \
            --cov-report=term-missing --cov-fail-under=90 \
            -q \
            tests/unit/core/config/test_safe_expression_evaluator.py \
            tests/unit/core/infrastructure/test_throttling_rate_limit.py \
            tests/unit/core/test_exception_handlers.py \
            tests/unit/core/test_request_context.py \
            tests/unit/core/test_request_id_middleware.py \
            tests/unit/organization/test_organization_access_policy.py
